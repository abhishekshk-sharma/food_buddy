<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳 Kitchen Panel | FlavorFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #1c1917;
            color: #f5f5f4;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qr-mimic {
            background: white;
            color: black;
            padding: 1rem 2rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-weight: 600;
        }

        .qr-code-box {
            background: #1c1917;
            color: white;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 16px;
            border: 3px solid #eab308;
        }

        .stats-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #292524;
            padding: 1rem 2rem;
            border-radius: 40px;
            border-left: 4px solid #eab308;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #eab308;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .order-card {
            background: #292524;
            border-radius: 32px;
            padding: 1.5rem;
            border-left: 8px solid #eab308;
            transition: all 0.2s;
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(234, 179, 8, 0.2);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #57534e;
        }

        .order-id {
            font-weight: 700;
            font-family: monospace;
            font-size: 1rem;
            color: #eab308;
            background: #1c1917;
            padding: 0.3rem 1rem;
            border-radius: 30px;
        }

        .table-number {
            background: #eab308;
            color: #1c1917;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 600;
        }

        .order-time {
            color: #a8a29e;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .items-list {
            margin: 1rem 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            color: #d6d3d1;
            font-size: 0.95rem;
        }

        .total {
            font-size: 1.3rem;
            font-weight: 700;
            color: #eab308;
            margin: 1rem 0;
            text-align: right;
            border-top: 1px solid #57534e;
            padding-top: 1rem;
        }

        .time-display {
            background: #3f3b39;
            padding: 1rem;
            border-radius: 30px;
            margin: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time-label {
            color: #a8a29e;
        }

        .time-value {
            color: #eab308;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .update-time-btn {
            background: #eab308;
            color: #1c1917;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .update-time-btn:hover {
            background: #facc15;
            transform: scale(1.02);
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        .status-pending {
            background: #b45309;
            color: white;
        }

        .status-preparing {
            background: #eab308;
            color: #1c1917;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #292524;
            padding: 2.5rem;
            border-radius: 48px;
            max-width: 450px;
            width: 90%;
            border: 2px solid #eab308;
        }

        .modal-content h2 {
            margin-bottom: 1rem;
            color: #eab308;
        }

        .modal-order-details {
            background: #1c1917;
            padding: 1rem;
            border-radius: 30px;
            margin: 1.5rem 0;
        }

        .modal-content input {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.1rem;
            border-radius: 40px;
            border: none;
            background: #3f3b39;
            color: white;
            margin: 1rem 0;
            border: 2px solid #57534e;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #eab308;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 1rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .save-btn {
            background: #eab308;
            color: #1c1917;
        }

        .save-btn:hover {
            background: #facc15;
        }

        .cancel-btn {
            background: #57534e;
            color: white;
        }

        .cancel-btn:hover {
            background: #6b6763;
        }

        .refresh-indicator {
            color: #a8a29e;
            margin-top: 2rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Add to cook.html styles */
.special-instructions-card {
    background: #422006;
    border-left: 4px solid #eab308;
    border-radius: 16px;
    padding: 1rem;
    margin-top: 1rem;
    animation: pulse 2s infinite;
}

.instructions-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
}

.instructions-icon {
    font-size: 1.2rem;
}

.instructions-label {
    color: #eab308;
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.instructions-content {
    color: white;
    font-style: italic;
    padding: 0.5rem;
    background: rgba(234, 179, 8, 0.1);
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.4;
    word-break: break-word;
}

@keyframes pulse {
    0%, 100% {
        box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4);
    }
    50% {
        box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.2);
    }
}
    </style>
</head>
<body>
    <div class="header">
        <h1>👨‍🍳 FlavorFlow Kitchen</h1>
        <div class="qr-mimic">
            <span>📷 QR Code Scanner (Mimic)</span>
            <div class="qr-code-box">
                <span>🍴</span>
            </div>
        </div>
    </div>

    <div class="stats-bar" id="stats-bar">
        <div class="stat-card">
            <div>Pending Orders</div>
            <div class="stat-number" id="pending-count">0</div>
        </div>
        <div class="stat-card">
            <div>Preparing</div>
            <div class="stat-number" id="preparing-count">0</div>
        </div>
        <div class="stat-card">
            <div>Total Today</div>
            <div class="stat-number" id="total-count">0</div>
        </div>
    </div>

    <div id="orders-container" class="orders-grid">
        <!-- Orders will be loaded here -->
        <p style="color: #a8a29e;">Loading orders...</p>
    </div>

    <div class="refresh-indicator">
        <span class="dot"></span>
        <span>Live updates every 3 seconds (won't interrupt your work)</span>
    </div>

    <!-- Modal for updating time -->
    <div class="modal-overlay" id="time-modal">
        <div class="modal-content">
            <h2>⏰ Update Preparation Time</h2>
            <p style="color: #d6d3d1;">Enter estimated time for order:</p>
            <div class="modal-order-details" id="modal-order-details">
                <span id="modal-order-id" style="color: #eab308; font-weight: 600;"></span>
            </div>
            <input type="text" id="modal-time-input" placeholder="e.g., 15 minutes" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="modal-btn save-btn" onclick="saveEstimatedTime()">Update Time</button>
            </div>
        </div>
    </div>

    <script>
        // Global variable to store the order ID we're updating
        let currentUpdatingOrderId = null;

        function openModal(orderId, currentTime, tableNumber) {
            currentUpdatingOrderId = orderId;
            document.getElementById('modal-order-id').textContent = `Order: ${orderId} | Table: ${tableNumber}`;
            document.getElementById('modal-time-input').value = currentTime !== '...' && currentTime !== 'Not set' ? currentTime : '';
            document.getElementById('time-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('modal-time-input').focus(), 100);
        }

        function closeModal() {
            document.getElementById('time-modal').style.display = 'none';
            currentUpdatingOrderId = null;
        }

        function saveEstimatedTime() {
            const newTime = document.getElementById('modal-time-input').value.trim();
            
            if (!newTime) {
                alert('Please enter an estimated time');
                return;
            }

            if (currentUpdatingOrderId) {
                updateEstimatedTime(currentUpdatingOrderId, newTime);
                closeModal();
            }
        }

        function updateEstimatedTime(orderId, newTime) {
            // Get all orders
            const allOrders = JSON.parse(localStorage.getItem('kitchenOrders')) || [];
            const orderIndex = allOrders.findIndex(o => o.id === orderId);

            if (orderIndex !== -1) {
                // Update the estimated time
                allOrders[orderIndex].estimatedTime = newTime;
                localStorage.setItem('kitchenOrders', JSON.stringify(allOrders));

                // Show success notification
                showNotification(`Time updated to ${newTime} for order ${orderId}`);
                
                // Refresh display
                loadKitchenOrders();
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #22c55e;
                color: #1c1917;
                padding: 1rem 2rem;
                border-radius: 40px;
                font-weight: 600;
                z-index: 1001;
                animation: slideIn 0.3s ease;
                box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            `;
            notification.textContent = '✅ ' + message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        function loadKitchenOrders() {
            const container = document.getElementById('orders-container');
            const orders = JSON.parse(localStorage.getItem('kitchenOrders')) || [];

            // Update stats
            const pending = orders.filter(o => !o.estimatedTime || o.estimatedTime === '...').length;
            const preparing = orders.filter(o => o.estimatedTime && o.estimatedTime !== '...').length;
            
            document.getElementById('pending-count').textContent = pending;
            document.getElementById('preparing-count').textContent = preparing;
            document.getElementById('total-count').textContent = orders.length;

            if (orders.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 4rem; background: #292524; border-radius: 40px;">🧑‍🍳 No orders yet. Waiting for customers...</div>';
                return;
            }

            // Sort orders: newest first
            const sortedOrders = [...orders].sort((a, b) => {
                return new Date(b.placedTime) - new Date(a.placedTime);
            });

            container.innerHTML = sortedOrders.map(order => {
                const hasEstimate = order.estimatedTime && order.estimatedTime !== '...';
                const displayTime = hasEstimate ? order.estimatedTime : 'Not set';
                const statusClass = hasEstimate ? 'status-preparing' : 'status-pending';
                const statusText = hasEstimate ? 'Preparing' : 'Pending';

                const itemsHTML = order.items.map(item => `
                    <div class="item-row">
                        <span>${item.name}</span>
                        <span>₹${item.price}</span>
                    </div>
                `).join('');

                return `
                    <div class="order-card" data-order-id="${order.id}">
                        <div class="order-header">
                            <span class="order-id">${order.id}</span>
                            <span class="table-number">Table ${order.tableNumber}</span>
                        </div>
                        <div class="order-time">🕐 ${order.placedTime || 'Just now'}</div>
                        
                        <div class="items-list">
                            ${order.items.map(item => `
                                <div class="item-row">
                                    <span>${item.name}</span>
                                    <span>₹${item.price}</span>
                                </div>
                            `).join('')}
                            
                            <!-- Special Instructions Highlighted Section -->
                            ${order.specialInstructions && order.specialInstructions !== 'No special instructions' ? `
                                <div class="special-instructions-card">
                                    <div class="instructions-header">
                                        <span class="instructions-icon">📝</span>
                                        <span class="instructions-label">Special Instructions</span>
                                    </div>
                                    <div class="instructions-content">
                                        "${order.specialInstructions}"
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="total">Total: ₹${order.total}</div>

                        <div class="time-display">
                            <span class="time-label">⏱️ Estimated Time:</span>
                            <span class="time-value">${displayTime}</span>
                        </div>

                        <div style="margin-bottom: 1rem;">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>

                        <button class="update-time-btn" onclick="openModal('${order.id}', '${displayTime}', '${order.tableNumber}')">
                            <span>⏰</span> Update Time
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('time-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Load initially
        loadKitchenOrders();

        // Poll for changes
        setInterval(loadKitchenOrders, 3000);
    </script>
</body>
</html>
