<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status | FlavorFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
        }

        /* Professional Header */
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 0 1rem;
            }
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo-accent {
            color: #eab308;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            padding: 0.6rem 0.2rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
            color: #475569;
        }

        .nav-link:hover {
            color: #eab308;
            background: #f1f5f9;
        }

        .nav-link.primary {
            background: #eab308;
            color: #0f172a;
            font-weight: 600;
        }

        .nav-link.primary:hover {
            background: #facc15;
        }

        /* Main Container */
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
                margin: 1rem auto;
            }
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: #64748b;
            font-size: 0.9rem;
        }

        .breadcrumb a {
            color: #64748b;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #eab308;
        }

        .breadcrumb .separator {
            color: #cbd5e1;
        }

        .breadcrumb .active {
            color: #0f172a;
            font-weight: 500;
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            text-decoration: none;
            margin-bottom: 1.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .back-link:hover {
            background: #f1f5f9;
            color: #eab308;
        }

        /* Status Card */
        .status-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }

        @media (max-width: 768px) {
            .status-card {
                padding: 1.5rem;
            }
        }

        .status-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .status-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .status-header h1 span {
            color: #eab308;
        }

        .order-id {
            background: #0f172a;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            display: inline-block;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #eab308;
            letter-spacing: -0.3px;
        }

        /* Timer Section */
        .timer-section {
            background: linear-gradient(135deg, #fefce8 0%, #fef9e7 100%);
            border: 1px solid #eab308;
            border-radius: 12px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
        }

        .timer-label {
            color: #854d0e;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .timer-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        @media (max-width: 768px) {
            .timer-value {
                font-size: 2rem;
            }
        }

        /* Items Section */
        .items-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            border: 1px solid #f1f5f9;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            color: #0f172a;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-title span {
            color: #eab308;
        }

        .table-info {
            background: white;
            padding: 0.8rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-label {
            color: #64748b;
            font-size: 0.9rem;
        }

        .table-number {
            font-weight: 600;
            color: #0f172a;
            background: #f1f5f9;
            padding: 0.2rem 0.8rem;
            border-radius: 4px;
        }

        .items-list {
            margin: 1rem 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-name {
            color: #475569;
            font-weight: 500;
        }

        .item-price {
            color: #eab308;
            font-weight: 600;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #0f172a;
            color: #0f172a;
        }

        .total-amount {
            color: #eab308;
            font-size: 1.3rem;
        }

        /* Special Instructions Card */
        .special-instructions-card {
            background: #fefce8;
            border: 1px solid #eab308;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            animation: softPulse 3s infinite;
        }

        .instructions-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .instructions-icon {
            width: 32px;
            height: 32px;
            background: #eab308;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
            font-weight: 600;
        }

        .instructions-title {
            font-weight: 600;
            color: #854d0e;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .instructions-content {
            background: white;
            border-radius: 8px;
            padding: 1.2rem;
            color: #0f172a;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.6;
            border-left: 4px solid #eab308;
        }

        .instructions-confirmation {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            color: #16a34a;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .confirmation-dot {
            width: 6px;
            height: 6px;
            background: #16a34a;
            border-radius: 50%;
        }

        @keyframes softPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.1);
            }
            50% {
                box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.05);
            }
        }

        /* Status Badge */
        .status-container {
            text-align: center;
            margin: 2rem 0;
        }

        .status-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 0.6rem 2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
            border: 1px solid #fbbf24;
        }

        .status-badge.preparing {
            background: #dbeafe;
            color: #1e40af;
            border-color: #60a5fa;
        }

        /* Refresh Note */
        .refresh-note {
            color: #94a3b8;
            font-size: 0.85rem;
            margin: 2rem 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid transparent;
            min-width: 140px;
        }

        .action-btn.primary {
            background: #eab308;
            color: #0f172a;
        }

        .action-btn.primary:hover {
            background: #facc15;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(234, 179, 8, 0.2);
        }

        .action-btn.secondary {
            background: #0f172a;
            color: white;
            border-color: #eab308;
        }

        .action-btn.secondary:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        .action-btn.outline {
            background: transparent;
            color: #0f172a;
            border: 1px solid #cbd5e1;
        }

        .action-btn.outline:hover {
            background: #f8fafc;
            border-color: #eab308;
            color: #eab308;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 3rem 2rem;
        }

        .error-state h2 {
            color: #ef4444;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .error-state p {
            color: #64748b;
            margin-bottom: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
            }
            
            .action-btn {
                width: 100%;
            }
            
            .timer-section {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Professional Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                Flavor<span class="logo-accent">Flow</span>
            </a>
            <div class="nav-links">
                <a href="my-orders.html" class="nav-link">My Orders</a>
                <a href="order-details.html" class="nav-link primary">Reserve Table</a>
                
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="index.html">Home</a>
            <span class="separator">/</span>
            <a href="my-orders.html">My Orders</a>
            <span class="separator">/</span>
            <span class="active">Order Status</span>
        </div>

        <!-- Back Link -->
        <a href="my-orders.html" class="back-link">
            ← Back to My Orders
        </a>
        
        <!-- Status Card -->
        <div class="status-card" id="status-card">
            <div class="status-header">
                <h1>Order <span>Status</span></h1>
                <span class="order-id" id="order-id-display">ORD-12345</span>
            </div>

            <!-- Timer Section -->
            <div class="timer-section">
                <div class="timer-label">Estimated Preparation Time</div>
                <div class="timer-value" id="estimated-time">--</div>
            </div>

            <!-- Items Section -->
            <div class="items-section">
                <div class="section-title">
                    <span>✦</span> Order Details
                </div>
                
                <div class="table-info">
                    <span class="table-label">Table Assignment</span>
                    <span class="table-number" id="table-number">Table 1</span>
                </div>
                
                <div class="items-list" id="items-container"></div>
                
                <div class="total-row" id="total-container">
                    <span>Total Amount</span>
                    <span class="total-amount" id="total-amount">₹0</span>
                </div>
            </div>

            <!-- Special Instructions Section -->
            <div id="special-instructions-container"></div>

            <!-- Status Badge -->
            <div class="status-container">
                <span class="status-badge" id="status-badge">Pending</span>
            </div>

            <!-- Refresh Note -->
            <div class="refresh-note">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span>Live updates every 5 seconds</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="order-details.html" class="action-btn primary">
                    New Order
                </a>
                <a href="my-orders.html" class="action-btn secondary">
                    My Orders
                </a>
                <a href="index.html" class="action-btn outline">
                    Home
                </a>
            </div>
        </div>
    </div>

    <script>
        function getOrderIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        function loadOrderStatus() {
            const orderId = getOrderIdFromUrl();
            
            // Get order from kitchen orders
            const allOrders = JSON.parse(localStorage.getItem('kitchenOrders')) || [];
            let order = allOrders.find(o => o.id === orderId);

            // If not found by ID, try active order
            if (!order) {
                order = JSON.parse(localStorage.getItem('activeCustomerOrder'));
            }

            if (!order) {
                // Show error state
                document.querySelector('.status-card').innerHTML = `
                    <div class="error-state">
                        <h2>Order Not Found</h2>
                        <p>We couldn't find your order. Please place a new order.</p>
                        <div class="action-buttons">
                            <a href="order-details.html" class="action-btn primary">Place New Order</a>
                            <a href="my-orders.html" class="action-btn secondary">View My Orders</a>
                            <a href="index.html" class="action-btn outline">Go Home</a>
                        </div>
                    </div>
                `;
                return;
            }

            displayOrder(order);
        }

        function displayOrder(order) {
            // Update basic info
            document.getElementById('order-id-display').textContent = order.id;
            document.getElementById('table-number').textContent = `Table ${order.tableNumber || '1'}`;
            
            // Update estimated time
            const timeValue = document.getElementById('estimated-time');
            timeValue.textContent = order.estimatedTime && order.estimatedTime !== '...' ? order.estimatedTime : 'Waiting for kitchen';
            
            // Update items
            const itemsContainer = document.getElementById('items-container');
            itemsContainer.innerHTML = order.items.map(item => `
                <div class="item-row">
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">₹${item.price}</span>
                </div>
            `).join('');
            
            // Update total
            document.getElementById('total-amount').textContent = `₹${order.total}`;
            
            // Update status badge
            const statusBadge = document.getElementById('status-badge');
            if (order.estimatedTime && order.estimatedTime !== '...') {
                statusBadge.textContent = `Preparing · Ready in ${order.estimatedTime}`;
                statusBadge.classList.add('preparing');
            } else {
                statusBadge.textContent = 'Pending · Waiting for kitchen';
                statusBadge.classList.remove('preparing');
            }

            // Show special instructions
            const instructionsContainer = document.getElementById('special-instructions-container');
            
            if (order.specialInstructions && order.specialInstructions !== 'No special instructions' && order.specialInstructions.trim() !== '') {
                instructionsContainer.innerHTML = `
                    <div class="special-instructions-card">
                        <div class="instructions-header">
                            <div class="instructions-icon">✎</div>
                            <span class="instructions-title">Special Request</span>
                        </div>
                        <div class="instructions-content">
                            "${order.specialInstructions}"
                        </div>
                        <div class="instructions-confirmation">
                            <span class="confirmation-dot"></span>
                            <span>Kitchen has received your instructions</span>
                        </div>
                    </div>
                `;
            } else {
                instructionsContainer.innerHTML = '';
            }
        }

        // Load initial status
        loadOrderStatus();

        // Refresh every 5 seconds
        setInterval(loadOrderStatus, 5000);
    </script>
</body>
</html>
