<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Select Food | FlavorFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
        }

        /* Professional Header */
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 0 1rem;
            }
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo-accent {
            color: #eab308;
        }

        .table-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .table-badge {
            background: #0f172a;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #eab308;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
            color: #475569;
        }

        .nav-link:hover {
            color: #eab308;
            background: #f1f5f9;
        }

        .nav-link.primary {
            background: #eab308;
            color: #0f172a;
            font-weight: 600;
        }

        .nav-link.primary:hover {
            background: #facc15;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
                margin: 1rem auto;
            }
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: #64748b;
            font-size: 0.9rem;
        }

        .breadcrumb a {
            color: #64748b;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #eab308;
        }

        .breadcrumb .separator {
            color: #cbd5e1;
        }

        .breadcrumb .active {
            color: #0f172a;
            font-weight: 500;
        }

        /* Page Title */
        .page-title {
            margin-bottom: 2rem;
        }

        .page-title h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .page-title h1 span {
            color: #eab308;
        }

        /* Category Filter */
        .filter-section {
            margin-bottom: 2rem;
        }

        .filter-scroll {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding: 0.5rem 0 1rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .filter-scroll::-webkit-scrollbar {
            height: 3px;
        }

        .filter-scroll::-webkit-scrollbar-track {
            background: #e2e8f0;
        }

        .filter-scroll::-webkit-scrollbar-thumb {
            background: #eab308;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            background: white;
            color: #475569;
            white-space: nowrap;
        }

        .filter-btn:hover {
            border-color: #eab308;
            color: #0f172a;
        }

        .filter-btn.active {
            background: #eab308;
            border-color: #eab308;
            color: #0f172a;
            font-weight: 600;
        }

        .filter-hint {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .filter-hint {
                display: none;
            }
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1.5rem;
            margin-bottom: 180px; /* Space for expanded summary */
        }

        @media (min-width: 640px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 2rem;
            }
        }

        @media (min-width: 1280px) {
            .menu-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Food Card */
        .food-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #f1f5f9;
        }

        .food-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px rgba(234, 179, 8, 0.1);
            border-color: #eab308;
        }

        .food-card.selected {
            border: 2px solid #eab308;
            box-shadow: 0 20px 30px -10px rgba(234, 179, 8, 0.2);
        }

        .food-image {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .food-rating {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #0f172a;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
            border: 1px solid #e2e8f0;
        }

        .select-indicator {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: #22c55e;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .food-card.selected .select-indicator {
            opacity: 1;
        }

        .food-content {
            padding: 1.5rem;
        }

        .food-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .food-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
        }

        .food-price {
            font-weight: 700;
            color: #eab308;
            font-size: 1.2rem;
        }

        .food-description {
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .food-details {
            display: flex;
            gap: 1.5rem;
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #f1f5f9;
            padding-top: 1rem;
        }

        .food-detail {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Floating Order Summary - Enhanced */
        .order-summary {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 2px solid #eab308;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .summary-header {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: white;
        }

        @media (max-width: 768px) {
            .summary-header {
                padding: 1rem;
            }
        }

        .summary-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .summary-title {
            font-weight: 500;
            color: #64748b;
            font-size: 0.9rem;
        }

        .selected-count {
            font-weight: 600;
            color: #0f172a;
            background: #f1f5f9;
            padding: 0.3rem 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .summary-header-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .summary-total {
            font-weight: 700;
            color: #eab308;
            font-size: 1.3rem;
        }

        .expand-icon {
            width: 32px;
            height: 32px;
            background: #f1f5f9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            transition: transform 0.3s;
        }

        .order-summary.expanded .expand-icon {
            transform: rotate(180deg);
        }

        /* Scrollable Selection Panel */
        .selection-panel {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 1.5rem;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: white;
        }

        .order-summary.expanded .selection-panel {
            max-height: 400px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .order-summary.expanded .selection-panel {
                max-height: 300px;
            }
            
            .summary-header-right {
                gap: 1rem;
            }
        }

        .selection-panel::-webkit-scrollbar {
            width: 4px;
        }

        .selection-panel::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .selection-panel::-webkit-scrollbar-thumb {
            background: #eab308;
            border-radius: 4px;
        }

        .selected-items-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .selected-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #f1f5f9;
        }

        .selected-item-image {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            background-size: cover;
            background-position: center;
            border: 1px solid #e2e8f0;
        }

        .selected-item-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .selected-item-details h4 {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.2rem;
            font-size: 1rem;
        }

        .selected-item-details p {
            color: #64748b;
            font-size: 0.85rem;
        }

        .selected-item-price {
            font-weight: 600;
            color: #eab308;
            font-size: 1.1rem;
        }

        .remove-item {
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 0.5rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .remove-item:hover {
            opacity: 1;
        }

        .empty-selection {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        /* Summary Footer */
        .summary-footer {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem 1.5rem;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        @media (max-width: 768px) {
            .summary-footer {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }
        }

        .grand-total {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
        }

        .grand-total span {
            color: #eab308;
            font-size: 1.5rem;
            margin-left: 0.5rem;
        }

        .review-btn {
            background: #eab308;
            color: #0f172a;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 160px;
        }

        .review-btn:hover:not(:disabled) {
            background: #facc15;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(234, 179, 8, 0.2);
        }

        .review-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            grid-column: 1/-1;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .empty-state p {
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .reset-btn {
            background: #eab308;
            color: #0f172a;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 4rem;
            grid-column: 1/-1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f1f5f9;
            border-top: 3px solid #eab308;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

                        <p>No items selected</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem;">Click on dishes to add them</p>
                    </div>
                </div>
            </div>

            <!-- Summary Footer -->
            <div class="summary-footer">
                <div class="grand-total">
                    Total Amount <span id="grand-total">₹0</span>
                </div>
                <button class="review-btn" id="review-order-btn" disabled>
                    Order →
                </button>
            </div>
        </div>
    </div>

            { id: 'f22', name: 'Tiramisu', price: 320, category: 'desserts', description: 'Classic Italian dessert with coffee-soaked ladyfingers and mascarpone', image: 'images/tiramishu.jpeg', time: '10-15 min', spice: 'Sweet', rating: '4.8' },
            { id: 'f23', name: 'Chocolate Lava', price: 280, category: 'desserts', description: 'Warm chocolate cake with molten center and vanilla ice cream', image: 'images/chocolate_lave.jpeg', time: '15-20 min', spice: 'Sweet', rating: '4.9' },
            { id: 'f24', name: 'Masala Chai', price: 120, category: 'beverages', description: 'Traditional Indian tea with cardamom, ginger, and aromatic spices', image: 'images/masala_chai.jpeg', time: '5-10 min', spice: 'Mild', rating: '4.8' },
            { id: 'f25', name: 'Mango Lassi', price: 150, category: 'beverages', description: 'Sweet yogurt drink with fresh mango pulp and cardamom', image: 'images/mango-lassi.jpg', time: '5-10 min', spice: 'Sweet', rating: '4.9' },
            { id: 'f26', name: 'Fresh Lime Soda', price: 110, category: 'beverages', description: 'Refreshing lime juice with sparkling water and mint', image: 'images/fresh_lime.jpeg', time: '5-10 min', spice: 'Mild', rating: '4.5' },
            { id: 'f27', name: 'Cold Coffee', price: 180, category: 'beverages', description: 'Chilled coffee with vanilla ice cream and chocolate syrup', image: 'images/cold_coffe.jpeg', time: '5-10 min', spice: 'Sweet', rating: '4.7' }
        ];
        
        // Get current order data
        let currentOrder = JSON.parse(localStorage.getItem('currentCustomerOrder')) || { tableNumber: 'N/A', items: [] };
        
        // Display table number
        document.getElementById('table-display').textContent = `Table ${currentOrder.tableNumber || '1'}`;

        // State
        let selectedItems = currentOrder.items ? [...currentOrder.items] : [];
        let currentCategory = 'all';
        let isLoading = true;
        let isExpanded = false;

        // Toggle summary expansion
        window.toggleSummary = function() {
            const summary = document.getElementById('order-summary');
            isExpanded = !isExpanded;
            if (isExpanded) {
                summary.classList.add('expanded');
            } else {
                summary.classList.remove('expanded');
            }
        };

        // Render menu
        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            
            if (isLoading) {
                grid.innerHTML = `
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Loading our signature dishes...</p>
                    </div>
                `;
                return;
            }

            const filteredItems = currentCategory === 'all' 
                ? menu 
                : menu.filter(item => item.category === currentCategory);

            if (filteredItems.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>No dishes found</h3>
                        <p>Try selecting a different category</p>
                        <button class="reset-btn" onclick="resetCategory()">View All Dishes</button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredItems.map(item => {
                const isSelected = selectedItems.some(i => i.id === item.id);
                return `
                    <div class="food-card ${isSelected ? 'selected' : ''}" data-id="${item.id}">
                        <div class="food-image" style="background-image: url('${item.image}')">
                            <span class="food-rating">★ ${item.rating || '4.5'}</span>
                            <div class="select-indicator">✓</div>
                        </div>
                        <div class="food-content">
                            <div class="food-header">
                                <span class="food-name">${item.name}</span>
                                <span class="food-price">₹${item.price}</span>
                            </div>
                            <p class="food-description">${item.description}</p>
                            <div class="food-details">
                                <span class="food-detail">🕒 ${item.time || '20-25 min'}</span>
                                <span class="food-detail">🌶️ ${item.spicy || 'Mild'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add click listeners
            document.querySelectorAll('.food-card').forEach(card => {
                card.addEventListener('click', function() {
                    const id = this.dataset.id;
                    const item = menu.find(m => m.id === id);
                    
                    const index = selectedItems.findIndex(i => i.id === id);
                    if (index === -1) {
                        selectedItems.push({ ...item, quantity: 1 });
                    } else {
                        selectedItems.splice(index, 1);
                    }
                    
                    renderMenu();
                    updateSummary();
                    updateSelectionPanel();
                });
            });
        }

        // Update summary header
        function updateSummary() {
            const countSpan = document.getElementById('selected-count');
            const summaryTotal = document.getElementById('summary-total');
            const grandTotal = document.getElementById('grand-total');
            const reviewBtn = document.getElementById('review-order-btn');

            if (selectedItems.length === 0) {
                countSpan.textContent = '0';
                summaryTotal.textContent = '₹0';
                grandTotal.textContent = '₹0';
                reviewBtn.disabled = true;
                return;
            }

            const total = selectedItems.reduce((sum, item) => sum + item.price, 0);
            countSpan.textContent = selectedItems.length;
            summaryTotal.textContent = `₹${total}`;
            grandTotal.textContent = `₹${total}`;
            reviewBtn.disabled = false;
        }

        // Update scrollable selection panel with images
        function updateSelectionPanel() {
            const panel = document.getElementById('selected-items-list');
            
            if (selectedItems.length === 0) {
                panel.innerHTML = `
                    <div class="empty-selection">
                        <p>No items selected</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem;">Click on dishes to add them</p>
                    </div>
                `;
                return;
            }

            panel.innerHTML = selectedItems.map(item => `
                <div class="selected-item">
                    <div class="selected-item-image" style="background-image: url('${item.image}')"></div>
                    <div class="selected-item-info">
                        <div class="selected-item-details">
                            <h4>${item.name}</h4>
                            <p>${item.time || '20-25 min'} • ${item.spicy || 'Mild'}</p>
                        </div>
                        <span class="selected-item-price">₹${item.price}</span>
                    </div>
                    <span class="remove-item" onclick="removeItem('${item.id}')">×</span>
                </div>
            `).join('');
        }

        // Remove individual item
        window.removeItem = function(itemId) {
            const index = selectedItems.findIndex(i => i.id === itemId);
            if (index !== -1) {
                selectedItems.splice(index, 1);
                renderMenu();
                updateSummary();
                updateSelectionPanel();
            }
        };

        // Reset category
        window.resetCategory = function() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === 'all') {
                    btn.classList.add('active');
                }
            });
            currentCategory = 'all';
            renderMenu();
        };

        // Category filter
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderMenu();
                
                if (window.innerWidth <= 768) {
                    document.getElementById('menu-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // Review order
        document.getElementById('review-order-btn').addEventListener('click', function() {
            if (selectedItems.length === 0) {
                alert('Please select at least one item.');
                return;
            }

            const total = selectedItems.reduce((sum, item) => sum + item.price, 0);

            currentOrder.items = selectedItems;
            currentOrder.total = total;
            currentOrder.status = 'pending-review';
            localStorage.setItem('currentCustomerOrder', JSON.stringify(currentOrder));

            window.location.href = 'order-review.html';
        });

        // Initialize
        setTimeout(() => {
            isLoading = false;
            renderMenu();
            updateSummary();
            updateSelectionPanel();
        }, 500);

        // Handle window resize
        window.addEventListener('resize', () => {
            updateSummary();
        });

        // Close expanded summary when clicking outside (optional)
        document.addEventListener('click', function(event) {
            const summary = document.getElementById('order-summary');
            const expandIcon = document.getElementById('expand-icon');
            
            if (isExpanded && !summary.contains(event.target)) {
                summary.classList.remove('expanded');
                isExpanded = false;
            }
        });
    </script>
</body>
</html>
