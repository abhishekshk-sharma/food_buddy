<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Select Food | FlavorFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f5f4;
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        @media (min-width: 768px) {
            .container {
                padding: 2rem;
            }
        }

        /* Header */
        .header {
            background: white;
            border-radius: 30px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 1rem 2rem;
                margin-bottom: 2rem;
                border-radius: 60px;
            }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-left h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #1c1917 0%, #eab308 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (min-width: 768px) {
            .header-left h1 {
                font-size: 2rem;
            }
        }

        .table-badge {
            background: #1c1917;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 2px solid #eab308;
            white-space: nowrap;
        }

        .header-right {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #1c1917;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            border: 2px solid transparent;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: #eab308;
            color: #1c1917;
        }

        .nav-btn.primary {
            background: #eab308;
            color: #1c1917;
        }

        .nav-btn.primary:hover {
            background: #facc15;
        }

        /* Category Filter - Horizontal Scroll on Mobile */
        .category-filter-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .category-filter {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding: 0.5rem 0.2rem 1rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }

        .category-filter::-webkit-scrollbar {
            height: 4px;
        }

        .category-filter::-webkit-scrollbar-track {
            background: #e7e5e4;
            border-radius: 10px;
        }

        .category-filter::-webkit-scrollbar-thumb {
            background: #eab308;
            border-radius: 10px;
        }

        .category-btn {
            background: white;
            border: 2px solid #e7e5e4;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            color: #57534e;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            white-space: nowrap;
            scroll-snap-align: start;
            flex-shrink: 0;
        }

        .category-btn:active {
            transform: scale(0.95);
        }

        .category-btn:hover {
            border-color: #eab308;
            color: #1c1917;
        }

        .category-btn.active {
            background: #eab308;
            border-color: #eab308;
            color: #1c1917;
        }

        /* Filter Hint for Mobile */
        .filter-hint {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: #a8a29e;
            font-size: 0.8rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .filter-hint {
                display: none;
            }
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 120px;
        }

        @media (min-width: 640px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.2rem;
            }
        }

        @media (min-width: 1024px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.5rem;
            }
        }

        @media (min-width: 1280px) {
            .menu-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.8rem;
            }
        }

        /* Food Card */
        .menu-item-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-item-card:active {
            transform: scale(0.98);
        }

        .menu-item-card.selected {
            border-color: #eab308;
            box-shadow: 0 15px 30px -10px rgba(234, 179, 8, 0.3);
        }

        .item-image {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        @media (min-width: 768px) {
            .item-image {
                height: 200px;
            }
        }

        .item-badge {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            background: #eab308;
            color: #1c1917;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            z-index: 2;
        }

        .select-indicator {
            position: absolute;
            top: 0.8rem;
            left: 0.8rem;
            background: #22c55e;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .menu-item-card.selected .select-indicator {
            opacity: 1;
        }

        .item-content {
            padding: 1.2rem;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            gap: 0.5rem;
        }

        .item-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1c1917;
            line-height: 1.3;
        }

        @media (min-width: 768px) {
            .item-header h3 {
                font-size: 1.3rem;
            }
        }

        .item-price {
            font-weight: 800;
            color: #eab308;
            font-size: 1.2rem;
            background: #1c1917;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: white;
            white-space: nowrap;
        }

        .item-description {
            color: #57534e;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-meta {
            display: flex;
            gap: 0.8rem;
            color: #a8a29e;
            font-size: 0.8rem;
            border-top: 1px dashed #e7e5e4;
            padding-top: 0.8rem;
            flex-wrap: wrap;
        }

        .item-meta span {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        /* Floating Order Summary - Mobile Optimized */
        .order-summary {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 1rem 1.2rem;
            border-top: 4px solid #eab308;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            box-shadow: 0 -5px 30px -5px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        @media (min-width: 768px) {
            .order-summary {
                padding: 1.5rem 2rem;
                border-radius: 40px 40px 0 0;
            }
        }

        .summary-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        @media (min-width: 768px) {
            .summary-content {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 2rem;
            }
        }

        .summary-info {
            flex: 1;
        }

        .summary-title {
            font-weight: 600;
            color: #57534e;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .selected-count {
            font-size: 1rem;
            font-weight: 700;
            color: #1c1917;
        }

        .selected-items-preview {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }

        .preview-item {
            background: #f5f5f4;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .preview-item span {
            color: #eab308;
            font-weight: 700;
        }

        .summary-total {
            font-size: 1.5rem;
            font-weight: 800;
            color: #eab308;
        }

        @media (min-width: 768px) {
            .summary-total {
                font-size: 2rem;
                min-width: 150px;
                text-align: right;
            }
        }

        .order-btn {
            background: #eab308;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        @media (min-width: 768px) {
            .order-btn {
                padding: 1rem 3rem;
                font-size: 1.2rem;
                width: auto;
            }
        }

        .order-btn:active {
            transform: scale(0.98);
        }

        .order-btn:hover {
            background: #facc15;
        }

        .order-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            background: white;
            border-radius: 30px;
            grid-column: 1/-1;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #1c1917;
        }

        .empty-state p {
            color: #57534e;
            margin-bottom: 1.5rem;
        }

        /* Loading State */
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            grid-column: 1/-1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f5f5f4;
            border-top: 4px solid #eab308;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pull to refresh hint (mobile) */
        .pull-hint {
            text-align: center;
            color: #a8a29e;
            font-size: 0.8rem;
            padding: 0.5rem;
            display: none;
        }

        @media (max-width: 768px) {
            .pull-hint {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>🍽️ Select Food</h1>
                <div class="table-badge" id="table-display">Table: --</div>
            </div>
            <div class="header-right">
                <a href="my-orders.html" class="nav-btn">
                    <span>📋</span>
                    <span class="hide-mobile">My Orders</span>
                </a>
                <a href="order-details.html" class="nav-btn primary">
                    <span>↩️</span>
                    <span class="hide-mobile">Change Table</span>
                </a>
            </div>
        </div>

        <!-- Category Filter (Horizontal Scroll on Mobile) -->
        <div class="category-filter-container">
            <div class="category-filter" id="category-filter">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="indian">Indian</button>
                <button class="category-btn" data-category="chinese">Chinese</button>
                <button class="category-btn" data-category="italian">Italian</button>
                <button class="category-btn" data-category="continental">Continental</button>
                <button class="category-btn" data-category="desserts">Desserts</button>
                <button class="category-btn" data-category="beverages">Beverages</button>
            </div>
        </div>
        <div class="filter-hint">
            <span>←</span> Swipe to see more categories <span>→</span>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid" id="menu-grid">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading delicious food...</p>
            </div>
        </div>

        <!-- Floating Order Summary -->
        <div class="order-summary" id="order-summary">
            <div class="summary-content">
                <div class="summary-info">
                    <div class="summary-title">Your Selection</div>
                    <div class="selected-count" id="selected-count">0 items</div>
                    <div class="selected-items-preview" id="selected-items-preview"></div>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem; width: 100%;">
                    <div class="summary-total" id="total-amount">₹0</div>
                    <button class="order-btn" id="review-order-btn" disabled>
                        <span>Review</span>
                        <span>→</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get menu from localStorage or use default
        const menu = JSON.parse(localStorage.getItem('restaurantMenu')) || [];
        
        // Get current order data
        let currentOrder = JSON.parse(localStorage.getItem('currentCustomerOrder')) || { tableNumber: 'N/A', items: [] };
        
        // Display table number
        document.getElementById('table-display').textContent = `Table: ${currentOrder.tableNumber || '1'}`;

        // State for selected items
        let selectedItems = currentOrder.items ? [...currentOrder.items] : [];

        // Filter state
        let currentCategory = 'all';

        // Loading state
        let isLoading = true;

        function filterItems(category) {
            currentCategory = category;
            renderMenu();
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            
            // Show loading state
            if (isLoading) {
                grid.innerHTML = `
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p>Loading delicious food...</p>
                    </div>
                `;
                return;
            }

            const filteredItems = currentCategory === 'all' 
                ? menu 
                : menu.filter(item => item.category === currentCategory);

            if (filteredItems.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>No items found</h3>
                        <p>Try selecting a different category</p>
                        <button class="category-btn active" onclick="filterItems('all')" style="display: inline-block;">View All</button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredItems.map(item => {
                const isSelected = selectedItems.some(i => i.id === item.id);
                return `
                    <div class="menu-item-card ${isSelected ? 'selected' : ''}" data-id="${item.id}">
                        <div class="item-image" style="background-image: url('${item.image}')">
                            <span class="item-badge">${item.rating || '4.5'} ★</span>
                            <div class="select-indicator">✓</div>
                        </div>
                        <div class="item-content">
                            <div class="item-header">
                                <h3>${item.name}</h3>
                                <span class="item-price">₹${item.price}</span>
                            </div>
                            <p class="item-description">${item.description}</p>
                            <div class="item-meta">
                                <span>⏱️ ${item.time || '20-25 min'}</span>
                                <span>${item.spicy || '🌶️ Mild'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add click listeners
            document.querySelectorAll('.menu-item-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    const id = this.dataset.id;
                    const item = menu.find(m => m.id === id);
                    
                    const index = selectedItems.findIndex(i => i.id === id);
                    if (index === -1) {
                        selectedItems.push({ ...item, quantity: 1 });
                        // Add haptic feedback on mobile (if supported)
                        if (window.navigator && window.navigator.vibrate) {
                            window.navigator.vibrate(10);
                        }
                    } else {
                        selectedItems.splice(index, 1);
                    }
                    
                    renderMenu(); // Re-render to update selected state
                    updateSummary();
                });
            });
        }

        function updateSummary() {
            const countSpan = document.getElementById('selected-count');
            const previewDiv = document.getElementById('selected-items-preview');
            const totalSpan = document.getElementById('total-amount');
            const orderBtn = document.getElementById('review-order-btn');

            if (selectedItems.length === 0) {
                countSpan.textContent = '0 items selected';
                previewDiv.innerHTML = '';
                totalSpan.textContent = '₹0';
                orderBtn.disabled = true;
                return;
            }

            let total = 0;
            countSpan.textContent = `${selectedItems.length} item${selectedItems.length > 1 ? 's' : ''}`;
            
            // Create preview chips (show max 2 on mobile, 3 on desktop)
            const maxPreview = window.innerWidth <= 768 ? 2 : 3;
            const previewItems = selectedItems.slice(0, maxPreview);
            
            previewDiv.innerHTML = previewItems.map(item => {
                total += item.price;
                return `
                    <div class="preview-item">
                        ${item.name.length > 15 ? item.name.substring(0, 12) + '...' : item.name} 
                        <span>₹${item.price}</span>
                    </div>
                `;
            }).join('');

            if (selectedItems.length > maxPreview) {
                previewDiv.innerHTML += `<div class="preview-item">+${selectedItems.length - maxPreview} more</div>`;
            }

            // Calculate total for all items
            total = selectedItems.reduce((sum, item) => sum + item.price, 0);
            totalSpan.textContent = `₹${total}`;
            orderBtn.disabled = false;
        }

        // Category filter listeners
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                filterItems(this.dataset.category);
                
                // Smooth scroll to top of grid on mobile
                if (window.innerWidth <= 768) {
                    document.getElementById('menu-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // Handle review order
        document.getElementById('review-order-btn').addEventListener('click', function() {
            if (selectedItems.length === 0) {
                alert('Please select at least one item.');
                return;
            }

            const total = selectedItems.reduce((sum, item) => sum + item.price, 0);

            currentOrder.items = selectedItems;
            currentOrder.total = total;
            currentOrder.status = 'pending-review';
            localStorage.setItem('currentCustomerOrder', JSON.stringify(currentOrder));

            window.location.href = 'order-review.html';
        });

        // Simulate loading
        setTimeout(() => {
            isLoading = false;
            renderMenu();
            updateSummary();
        }, 500);

        // Initial render
        renderMenu();
        updateSummary();

        // Handle window resize for responsive preview
        window.addEventListener('resize', () => {
            updateSummary();
        });

        // Add pull to refresh hint (simulated)
        let touchStart = 0;
        document.addEventListener('touchstart', (e) => {
            touchStart = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (window.scrollY === 0 && e.touches[0].clientY > touchStart + 100) {
                // Show refresh hint
                const hint = document.querySelector('.pull-hint');
                if (hint) hint.style.opacity = '1';
            }
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (window.scrollY === 0 && e.changedTouches[0].clientY > touchStart + 100) {
                // Refresh the page
                window.location.reload();
            }
        }, { passive: true });
    </script>

    <style>
        /* Mobile-specific styles */
        @media (max-width: 768px) {
            .hide-mobile {
                display: none;
            }
            
            .nav-btn {
                padding: 0.6rem 1rem;
            }
            
            .table-badge {
                font-size: 0.8rem;
                padding: 0.4rem 1rem;
            }
            
            .item-price {
                font-size: 1rem;
            }
        }

        /* Small phones */
        @media (max-width: 380px) {
            .header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .header-right {
                width: 100%;
                justify-content: space-between;
            }
            
            .nav-btn {
                flex: 1;
                justify-content: center;
            }
            
            .item-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .item-price {
                align-self: flex-start;
            }
        }
    </style>
</body>
</html>
