<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details | FlavorFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f5f5f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .form-card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 2.5rem;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid #e7e5e4;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #1c1917;
        }

        .sub {
            color: #57534e;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #292524;
        }

        input[type="number"] {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            border: 2px solid #d6d3d1;
            border-radius: 30px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="number"]:focus {
            border-color: #eab308;
        }

        .action-btn {
            background: #eab308;
            color: #1c1917;
            border: none;
            padding: 1rem;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
            border: 2px solid #eab308;
        }

        .action-btn:hover {
            background: #facc15;
            transform: scale(1.02);
        }

        .back-link {
            display: inline-block;
            color: #57534e;
            text-decoration: none;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>Your details</h1>
        <p class="sub">We'll get your order ready</p>

        <div class="input-group">
            <label for="table-number">Table Number</label>
            <input type="number" id="table-number" min="1" value="1" placeholder="e.g., 5">
        </div>

        <button class="action-btn" id="proceed-to-menu">PROCEED TO MENU</button>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <!-- Add this after the form card or in the header -->
    <div style="text-align: center; margin-top: 1rem;">
        <a href="my-orders.html" style="color: #57534e; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem;">
            <span>📋</span> View My Orders
        </a>
    </div>

    <script>
        document.getElementById('proceed-to-menu').addEventListener('click', function() {
            const tableNumber = document.getElementById('table-number').value;
            
            // Validate
            if (!tableNumber || tableNumber < 1) {
                alert('Please enter a valid table number.');
                return;
            }

            // Save table number to localStorage
            let currentOrder = JSON.parse(localStorage.getItem('currentCustomerOrder')) || {};
            currentOrder.tableNumber = tableNumber;
            currentOrder.items = []; // Reset items if any
            currentOrder.status = 'pending';
            localStorage.setItem('currentCustomerOrder', JSON.stringify(currentOrder));

            // Redirect to menu selection
            window.location.href = 'food-menu.html';
        });
    </script>
</body>
</html>
